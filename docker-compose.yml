services:
  moli-door:
    image: ${DOCKER_IMAGE:-bs10081/moli-door:dev}
    container_name: moli-door-system
    restart: unless-stopped

    # 使用精確的 capabilities 取代 privileged
    cap_add:
      - SYS_RAWIO  # GPIO 存取

    # Device mappings
    devices:
      - /dev/gpiomem:/dev/gpiomem  # GPIO access
      - /dev/input:/dev/input      # RFID reader access

    # Network mode: host（不需要 ports 映射）
    network_mode: host

    # Volume for persistent database
    volumes:
      - ./data:/app/data

    # Use .env file for environment variables
    env_file:
      - .env

    labels:
      - com.centurylinklabs.watchtower.enable=true
      - com.centurylinklabs.watchtower.scope=moli-door

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: ${WATCHTOWER_IMAGE:-nickfedor/watchtower:latest}
    container_name: moli-door-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --interval
      - ${WATCHTOWER_POLL_INTERVAL:-300}
      - --cleanup
      - --label-enable
      - --scope
      - moli-door
    environment:
      WATCHTOWER_NO_STARTUP_MESSAGE: "true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
